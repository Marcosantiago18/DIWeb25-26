<!DOCTYPE html>
<html lang="es" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscripción - CodeMSG</title>
    <link href="./css/estilos.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
        }
    </style>
</head>

<body class="bg-black text-white antialiased selection:bg-white selection:text-black flex flex-col min-h-screen">

    <!-- Navbar Minimalista -->
    <nav class="absolute top-0 w-full z-50 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center">
                <a href="index.html" class="flex items-center gap-2 group">
                    <div
                        class="w-8 h-8 rounded-lg bg-white/10 flex items-center justify-center group-hover:bg-white/20 transition-colors">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7">
                            </path>
                        </svg>
                    </div>
                    <span
                        class="text-xl font-bold tracking-tight text-white group-hover:text-gray-300 transition-colors">Volver</span>
                </a>
                <div class="shrink-0">
                    <span class="text-xl font-bold tracking-tight text-white">CODEMSG</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content - Centered Form -->
    <main class="grow flex items-center justify-center px-4 sm:px-6 lg:px-8 py-20 relative overflow-hidden">

        <!-- Background Elements -->
        <div class="absolute top-0 left-1/4 w-96 h-96 bg-blue-500/20 rounded-full blur-3xl -z-10 animate-pulse"></div>
        <div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl -z-10 animate-pulse"
            style="animation-delay: 1s;"></div>

        <div
            class="w-full max-w-md space-y-8 bg-zinc-900/50 backdrop-blur-xl p-8 rounded-3xl border border-white/10 shadow-2xl">
            <div class="text-center">
                <h2 class="text-3xl font-bold text-white mb-2">Únete a la Revolución</h2>
                <p class="text-gray-400 text-sm">Completa tus datos para comenzar tu viaje en programación.</p>
            </div>

            <form class="mt-8 space-y-6" action="#" method="POST">
                <div class="space-y-4">
                    <div>
                        <label for="full-name" class="sr-only">Nombre Completo</label>
                        <input id="full-name" name="full-name" type="text" autocomplete="name" required
                            class="appearance-none relative block w-full px-4 py-3 border border-white/10 placeholder-gray-500 text-white rounded-xl bg-black/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition-all"
                            placeholder="Nombre Completo">
                    </div>
                    <div>
                        <label for="email-address" class="sr-only">Correo Electrónico</label>
                        <input id="email-address" name="email" type="email" autocomplete="email" required
                            class="appearance-none relative block w-full px-4 py-3 border border-white/10 placeholder-gray-500 text-white rounded-xl bg-black/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition-all"
                            placeholder="Correo Electrónico">
                    </div>
                    <div>
                        <label for="course-select" class="sr-only">Curso de Interés</label>
                        <select id="course-select" name="course"
                            class="appearance-none relative block w-full px-4 py-3 border border-white/10 placeholder-gray-500 text-gray-400 rounded-xl bg-black/50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm transition-all">
                            <option value="" disabled selected>Selecciona un curso</option>
                            <option value="frontend">Frontend Moderno</option>
                            <option value="backend">Backend Escalable</option>
                            <option value="database">Bases de Datos</option>
                            <option value="devops">DevOps & Cloud</option>
                        </select>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <div class="flex items-center">
                        <input id="terms" name="terms" type="checkbox"
                            class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-white/20 rounded bg-black/50">
                        <label for="terms" class="ml-2 block text-gray-400">
                            Acepto los <a href="#" class="text-blue-400 hover:text-blue-300">términos</a>
                        </label>
                    </div>
                </div>

                <div>
                    <button type="submit"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-full text-black bg-white hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-black focus:ring-white transition-all transform hover:-translate-y-1 shadow-lg shadow-white/10">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <svg class="h-5 w-5 text-gray-500 group-hover:text-gray-800 transition-colors"
                                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
                                aria-hidden="true">
                                <path fill-rule="evenodd"
                                    d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                                    clip-rule="evenodd" />
                            </svg>
                        </span>
                        Inscribirme Ahora
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="py-6 text-center text-gray-600 text-sm relative z-10">
        &copy; 2024 CodeMSG. Todos los derechos reservados.
    </footer>

</body>

</html>
