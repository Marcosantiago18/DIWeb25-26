<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica Formulario</title>
    <link rel="stylesheet" href="./css/estilos.css">
</head>

<body class="bg-black h-screen flex justify-center items-center">

    <div class="bg-black border border-zinc-700 p-8 rounded-2xl w-full max-w-sm">
        
        <form class="flex flex-col gap-5">
            <h1 class="text-3xl font-bold text-white mb-8">Sign Up</h1>

            <div class="flex flex-col gap-2">
                <label for="nombre" class="text-white text-sm font-medium">Name</label>
                <input type="text" id="nombre" name="nombre" placeholder="Enter your name"
                    class="bg-black border border-zinc-600 text-gray-200 text-sm rounded-lg p-3 bg-opacity-50 focus:outline-none focus:border-blue-500 transition-colors placeholder-zinc-500">
            </div>

            <div class="flex flex-col gap-2">
                <label for="email" class="text-white text-sm font-medium">Email</label>
                <input type="text" id="email" name="email" placeholder="Enter your email"
                    class="bg-black border border-zinc-600 text-gray-200 text-sm rounded-lg p-3 bg-opacity-50 focus:outline-none focus:border-blue-500 transition-colors placeholder-zinc-500">
            </div>

            <div class="flex flex-col gap-2">
                <label for="password" class="text-white text-sm font-medium">Password</label>
                <input type="text" id="password" name="password" placeholder="Enter your password"
                    class="bg-black border border-zinc-600 text-gray-200 text-sm rounded-lg p-3 bg-opacity-50 focus:outline-none focus:border-blue-500 transition-colors placeholder-zinc-500">
            </div>

            <div class="flex items-center gap-2 mt-1">
                <input type="checkbox" name="terms" id="terms" class="w-4 h-4 accent-fuchsia-600 rounded ">
                <label for="terms" class="text-white text-sm font-medium">I agree with terms and
                    conditions</label>
            </div>

            <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold p-2 rounded-lg"
                >
                Sign Up
            </button>
        </form>
    </div>
</body>
</html>
